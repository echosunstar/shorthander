name: Build Production Android Bundle

on:
  push:
    tags:
      - 'v*' # Fires automatically when you push a version tag like v1.0.4

jobs:
  build-and-sign:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    env:
      BUILD_TOOLS_VERSION: "34.0.0"

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup Java Development Kit (JDK 21)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
          cache: 'gradle'

      - name: Install Web Dependencies & Build Assets
        run: |
          npm install
          npm run build --if-present 

      - name: Capacitor Sync
        run: |
          npx cap sync android

      # 1. Instruct Gradle to compile BOTH distribution formats simultaneously
      - name: Build Production Release Bundle (.aab) & Package (.apk)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease assembleRelease

      # 2. Your original, proven AAB signing step (Unchanged except for step ID)
      - name: Sign Android App Bundle (.aab)
        id: sign_aab
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: android/app/build/outputs/bundle/release
          signingKeyBase64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          alias: ${{ secrets.ANDROID_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}

      # 3. New isolated track to sign your direct-download APK file
      - name: Sign Android App Package (.apk)
        id: sign_apk
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: android/app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          alias: ${{ secrets.ANDROID_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}

      # 4. Upload your signed Google Play Asset
      - name: Upload Signed App Bundle Artifact
        uses: actions/upload-artifact@v4
        with:
          name: shorthander-bundle-${{ github.ref_name }}
          path: ${{ steps.sign_aab.outputs.signedReleaseFile }}
          retention-days: 7

      # 5. Upload your signed direct-download installer asset
      - name: Upload Signed APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: shorthander-apk-${{ github.ref_name }}
          path: ${{ steps.sign_apk.outputs.signedReleaseFile }}
          retention-days: 7

      - name: Clean Up Package Filename for Presentation
        run: |
          mv ${{ steps.sign_apk.outputs.signedReleaseFile }} android/app/build/outputs/apk/release/Shorthander-${{ github.ref_name }}.apk
          mv ${{ steps.sign_aab.outputs.signedReleaseFile }} android/app/build/outputs/bundle/release/Shorthander-${{ github.ref_name }}.aab

      # 6. Automatic release generator (Only runs when you push a version tag)
      - name: Create Automatic GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          tag_name: ${{ github.ref_name }}
          name: Shorthander ${{ github.ref_name }}
          body: "Automated production release built via GitHub Actions CI for proven cryptographic provenance."
          draft: false
          prerelease: false
          files: |
            android/app/build/outputs/apk/release/Shorthander-${{ github.ref_name }}.apk
            android/app/build/outputs/bundle/release/Shorthander-${{ github.ref_name }}.aab
        
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}