name: Build Production Android Bundle

on:
  push:
    tags:
      - 'v*' # Fires the pipeline automatically when you push a version tag like v1.0.0

jobs:
  build-and-sign:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java Development Kit (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Install Web Dependencies & Build Assets
        run: |
          npm ci
          npm run build --if-present 

      - name: Capacitor Sync
        run: |
          npx cap sync android

      - name: Build Production Release Bundle (.aab)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease

      - name: Sign Android App Bundle
        id: sign_app
        uses: r0adkll/sign-android-release@v1
        with:
          bundleReleaseFiles: android/app/build/outputs/bundle/release/app-release.aab
          alias: ${{ secrets.ANDROID_KEY_ALIAS }}
          keyStoreBase64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Upload Signed App Bundle Artifact
        uses: actions/upload-artifact@v4
        with:
          name: shorthander-release-${{ github.ref_name }}
          path: ${{ steps.sign_app.outputs.signedReleaseFile }}
          retention-days: 7
