<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shorthander</title>
    <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
    <script nomodule src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" />
    <style>
        :root {
            --ion-font-family: sans-serif;
        }

        .scratch-input {
            width: 100%;
            border: none;
            background: transparent;
            outline: none;
            font-size: 16px;
            padding: 12px 0;
            resize: none;
            font-family: inherit;
            color: #000000;
        }
        
        .telegraph-footer {
            text-align: center;
            margin-top: 35px;
            padding: 10px 0;
            font-size: 11px;
            color: #7f8c8d;
            font-family: monospace;
            letter-spacing: 0.1px;
            border-top: 1px dashed #e2e8f0;
        }
    </style>
</head>

<body>
    <ion-app>
        <ion-header>
            <ion-toolbar color="dark">
                <ion-title>
                    Shorthander 
                    <span style="color: #e64553; font-size: 13px; font-weight: 500; font-style: italic; margin-left: 6px;">
                        - there is only one
                    </span>
                </ion-title>
            </ion-toolbar>
        </ion-header>
        <ion-content class="ion-padding" color="light">
            <ion-list lines="inset" id="dynamic-list-container">
            </ion-list>
        </ion-content>
    </ion-app>

    <script>
        let activeKeys = [];
        let focusedKey = null;
        let lastCleared = {};
        let initialValues = {}; 

        function getDateString(date) {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        }

        function getConciseLabel(date) {
            const d = date.getDate();
            const months = ['jan', 'feb', 'mar', 'apr', 'may', 'jun', 'jul', 'aug', 'sep', 'oct', 'nov', 'dec'];
            return `${d}-${months[date.getMonth()]}-${String(date.getFullYear()).slice(-2)}`;
        }

        function initializeDateTrack() {
            let anchorDate = new Date();
            let isWidgetOpen = false;

            if (window.AndroidWidgetBridge) {
                const targetedDay = window.AndroidWidgetBridge.getPendingDay();
                if (targetedDay && targetedDay.match(/^\d{4}-\d{2}-\d{2}$/)) {
                    const parts = targetedDay.split('-');
                    anchorDate = new Date(parts[0], parts[1] - 1, parts[2]);
                    focusedKey = targetedDay;
                    isWidgetOpen = true;
                }
            }

            const container = document.getElementById('dynamic-list-container');
            container.innerHTML = '';

            if (!isWidgetOpen) {
                container.innerHTML = `
                    <div style="text-align: center; padding: 20px 5px;">
                        <h2 style="color: #1e1e2e; font-weight: 800; font-size: 24px; margin-bottom: 2px;">Shorthander</h2>
                        <p style="font-style: italic; color: #e64553; margin-top: 0; margin-bottom: 25px; font-size: 13px; font-weight: 600;">
                            Shorthander - there is only one
                        </p>
                        
                        <ion-card style="margin: 0; text-align: left; background: #ffffff; box-shadow: none; border: 1px solid #e2e8f0; border-radius: 8px;">
                            <ion-card-header>
                                <ion-card-title style="font-size: 14px; font-weight: bold; color: #1e1e2e; font-family: monospace;">SYSTEM_OPERATIONS</ion-card-title>
                            </ion-card-header>
                            <ion-card-content style="color: #4c4f69; font-size: 13px; font-family: monospace; line-height: 1.7;">
                                <div>• TAP_WIDGET &nbsp;→ OPEN_EDITOR</div>
                                <div>• ENTER_KEY &nbsp;→ SAVE_AND_EXIT</div>
                                <div style="margin-top: 8px; border-top: 1px dashed #e2e8f0; padding-top: 8px;">• ,, OR .. &nbsp;→ INLINE_DIVIDER ( # )</div>
                                <div>• FFF &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;→ CARRY_FORWARD_YEST</div>
                                <div>• BBB &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;→ BUMP_TO_TOMORROW</div>
                                <div>• DDD &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;→ MARK_COMPLETED ( ✓ )</div>
                                <div>• TTT &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;→ TIMESTAMP ([HH:MM])</div>
                                <div>• XXX &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;→ WIP_HISTORY (BLANK)</div>
                                <div>• NNN &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;→ UNDO_LAST_WIPE</div>
                                <div>• VVV &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;→ ABORT_SESSION (ESC)</div>
                            </ion-card-content>
                        </ion-card>
                    </div>
                `;
                return;
            }

            activeKeys = [];
            const labelColors = ['primary', 'success', 'warning'];

            for (let i = -1; i <= 1; i++) {
                const workingDate = new Date(anchorDate);
                workingDate.setDate(anchorDate.getDate() + i);

                const k = getDateString(workingDate);
                const labelText = getConciseLabel(workingDate).toUpperCase();
                activeKeys.push(k);

                const currentSavedVal = window.AndroidWidgetBridge ? window.AndroidWidgetBridge.getDayText(k) : '';
                initialValues[k] = currentSavedVal; 

                const rowHTML = `
          <ion-item-group style="margin-top: ${i === -1 ? '0' : '15'}px;">
            <ion-item-divider><ion-label color="${labelColors[i + 1]}">${labelText}</ion-label></ion-divider>
            <ion-item>
              <textarea id="input-${k}" class="scratch-input" placeholder="..." rows="2" enterkeyhint="done">${currentSavedVal}</textarea>
            </ion-item>
          </ion-item-group>
        `;
                container.insertAdjacentHTML('beforeend', rowHTML);
            }

            // Expanded one-line dynamic telemetry bar
            const macroFooterHTML = `
                <div class="telegraph-footer">
                    ,,/..=# | fff=fwd | bbb=bump | ddd=✓ | ttt=time | xxx=clr | nnn=undo | vvv=esc
                </div>
            `;
            container.insertAdjacentHTML('beforeend', macroFooterHTML);

            bindInputListeners();
        }

        function bindInputListeners() {
            activeKeys.forEach(k => {
                const element = document.getElementById(`input-${k}`);
                if (!element) return;

                element.addEventListener('input', (e) => {
                    const target = e.target;
                    const val = target.value;
                    const cursorPosition = target.selectionStart;
                    const textBeforeCursor = val.slice(0, cursorPosition);
                    const lowerTextBefore = textBeforeCursor.toLowerCase();

                    // --- TRIPLE-V ESCAPE ACTION ---
                    if (lowerTextBefore.endsWith('vvv')) {
                        const originalValue = initialValues[k] || '';
                        target.value = originalValue;
                        if (window.AndroidWidgetBridge) {
                            window.AndroidWidgetBridge.saveDayText(k, originalValue);
                            window.AndroidWidgetBridge.goHome();
                        }
                        return; 
                    }

                    // --- TRIPLE-X WIPE SYSTEM ---
                    if (lowerTextBefore.endsWith('xxx')) {
                        const preservedContent = val.slice(0, cursorPosition - 3) + val.slice(cursorPosition);
                        if (preservedContent.trim().length > 0) {
                            lastCleared[k] = preservedContent;
                        }
                        target.value = '';
                        if (window.AndroidWidgetBridge) {
                            window.AndroidWidgetBridge.saveDayText(k, '');
                        }
                        return; 
                    }

                    // --- TRIPLE-N UNDO SYSTEM ---
                    if (lowerTextBefore.endsWith('nnn')) {
                        if (lastCleared[k]) {
                            const restoredContent = val.slice(0, cursorPosition - 3) + lastCleared[k] + val.slice(cursorPosition);
                            target.value = restoredContent;
                            const newCursorPos = cursorPosition - 3 + lastCleared[k].length;
                            target.setSelectionRange(newCursorPos, newCursorPos);
                            lastCleared[k] = '';
                            if (window.AndroidWidgetBridge) {
                                window.AndroidWidgetBridge.saveDayText(k, target.value);
                            }
                            return;
                        }
                    }

                    // --- TRIPLE-F CARRY FORWARD SYSTEM ---
                    if (lowerTextBefore.endsWith('fff')) {
                        const currentParts = k.split('-');
                        const currentDateObj = new Date(currentParts[0], currentParts[1] - 1, currentParts[2]);
                        currentDateObj.setDate(currentDateObj.getDate() - 1);
                        const yestKey = getDateString(currentDateObj);

                        let yestText = window.AndroidWidgetBridge ? window.AndroidWidgetBridge.getDayText(yestKey) : '';
                        yestText = yestText.trim();

                        if (yestText.length > 0) {
                            const baseText = val.slice(0, cursorPosition - 3);
                            const trailingText = val.slice(cursorPosition);
                            const separator = (baseText.trim().length > 0 && !baseText.endsWith(' ')) ? ' # ' : (baseText.trim().length > 0 ? '# ' : '');
                            
                            target.value = baseText + separator + yestText + trailingText;
                            const newCursorPos = baseText.length + separator.length + yestText.length;
                            target.setSelectionRange(newCursorPos, newCursorPos);
                        } else {
                            target.value = val.slice(0, cursorPosition - 3) + val.slice(cursorPosition);
                            target.setSelectionRange(cursorPosition - 3, cursorPosition - 3);
                        }

                        if (window.AndroidWidgetBridge) {
                            window.AndroidWidgetBridge.saveDayText(k, target.value);
                        }
                        return;
                    }

                    // --- TRIPLE-B BUMP TO TOMORROW SYSTEM ---
                    if (lowerTextBefore.endsWith('bbb')) {
                        const currentParts = k.split('-');
                        const currentDateObj = new Date(currentParts[0], currentParts[1] - 1, currentParts[2]);
                        currentDateObj.setDate(currentDateObj.getDate() + 1);
                        const tomorrowKey = getDateString(currentDateObj);

                        const bumpedText = val.slice(0, cursorPosition - 3).trim();
                        target.value = val.slice(cursorPosition); // Cut segment out of current field

                        if (bumpedText.length > 0) {
                            let tomorrowText = window.AndroidWidgetBridge ? window.AndroidWidgetBridge.getDayText(tomorrowKey) : '';
                            tomorrowText = tomorrowText.trim();
                            const separator = tomorrowText.length > 0 ? ' # ' : '';
                            const newTomorrowVal = tomorrowText + separator + bumpedText;

                            // Live sync DOM field if wide-view column is active on screen
                            const tomorrowEl = document.getElementById(`input-${tomorrowKey}`);
                            if (tomorrowEl) {
                                tomorrowEl.value = newTomorrowVal;
                            }
                            if (window.AndroidWidgetBridge) {
                                window.AndroidWidgetBridge.saveDayText(tomorrowKey, newTomorrowVal);
                            }
                        }

                        if (window.AndroidWidgetBridge) {
                            window.AndroidWidgetBridge.saveDayText(k, target.value);
                        }
                        return;
                    }

                    // --- TRIPLE-D COMPLETED MARK MACRO ---
                    if (lowerTextBefore.endsWith('ddd')) {
                        const baseText = val.slice(0, cursorPosition - 3);
                        const trailingText = val.slice(cursorPosition);
                        target.value = baseText + ' ✓ ' + trailingText;
                        const newCursorPos = baseText.length + 3;
                        target.setSelectionRange(newCursorPos, newCursorPos);
                        if (window.AndroidWidgetBridge) {
                            window.AndroidWidgetBridge.saveDayText(k, target.value);
                        }
                        return;
                    }

                    // --- TRIPLE-T TELEGRAPHIC TIMESTAMP MACRO ---
                    if (lowerTextBefore.endsWith('ttt')) {
                        const now = new Date();
                        const hh = String(now.getHours()).padStart(2, '0');
                        const mm = String(now.getMinutes()).padStart(2, '0');
                        const timeStr = `[${hh}:${mm}] `;
                        
                        const baseText = val.slice(0, cursorPosition - 3);
                        const trailingText = val.slice(cursorPosition);
                        target.value = baseText + timeStr + trailingText;
                        const newCursorPos = baseText.length + timeStr.length;
                        target.setSelectionRange(newCursorPos, newCursorPos);
                        if (window.AndroidWidgetBridge) {
                            window.AndroidWidgetBridge.saveDayText(k, target.value);
                        }
                        return;
                    }

                    // --- LAYOUT DIVIDER MACROS ---
                    let matchLength = 0;
                    if (lowerTextBefore.endsWith(',,') || lowerTextBefore.endsWith('..')) {
                        matchLength = 2;
                    } else if (lowerTextBefore.endsWith('…')) {
                        matchLength = 1;
                    }

                    if (matchLength > 0) {
                        const expandedText = val.slice(0, cursorPosition - matchLength) + ' # ' + val.slice(cursorPosition);
                        target.value = expandedText;
                        const newCursorPos = cursorPosition - matchLength + 3;
                        target.setSelectionRange(newCursorPos, newCursorPos);
                    }

                    if (window.AndroidWidgetBridge) {
                        window.AndroidWidgetBridge.saveDayText(k, target.value);
                    }
                });

                element.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        if (window.AndroidWidgetBridge) {
                            window.AndroidWidgetBridge.saveDayText(k, e.target.value);
                            window.AndroidWidgetBridge.goHome();
                        }
                    }
                });
            });

            // --- NATIVE-BACKED KEYBOARD TRIGGER & PADDING ENGINE ---
            if (focusedKey) {
                const targetInput = document.getElementById(`input-${focusedKey}`);
                if (targetInput) {
                    setTimeout(() => { 
                        targetInput.focus(); 
                        
                        if (window.AndroidWidgetBridge && typeof window.AndroidWidgetBridge.forceSystemKeyboard === 'function') {
                            window.AndroidWidgetBridge.forceSystemKeyboard();
                        }
                        
                        let currentVal = targetInput.value;
                        if (currentVal.length > 0 && !currentVal.endsWith(' ')) {
                            targetInput.value = currentVal + ' ';
                            if (window.AndroidWidgetBridge) {
                                window.AndroidWidgetBridge.saveDayText(focusedKey, targetInput.value);
                            }
                        }
                        
                        const textEndIndex = targetInput.value.length;
                        targetInput.setSelectionRange(textEndIndex, textEndIndex);
                    }, 300); 
                }
            }
        }

        window.checkWidgetTrigger = initializeDateTrack;

        window.addEventListener('DOMContentLoaded', () => {
            initializeDateTrack();
        });
    </script>
</body>

</html>
