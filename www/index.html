<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Widget Config Panel</title>
  <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
  <script nomodule src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" />
  <style>
    :root { --ion-font-family: sans-serif; }
  </style>
</head>
<body>
  <ion-app>
    <ion-header>
      <ion-toolbar color="dark">
        <ion-title>Widget Controller</title>
      </ion-toolbar>
    </ion-header>

    <ion-content class="ion-padding">
      <h2>Vanilla JS Setup</h2>
      <p>This UI acts as your main app workspace or configuration panel.</p>
      <ion-button id="action-btn" expand="block" color="primary">Test Action</ion-button>
    </ion-content>
  </ion-app>

  <script>
    // Standard Vanilla JS DOM interactions
    document.getElementById('action-btn').addEventListener('click', () => {
      console.log('Button clicked in vanilla app context.');
      alert('Hello from the vanilla JS layer!');
    });
  </script>
</body>
</html>
